server:
  port: 8080

spring:
  application:
    name: fun-alarm
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  datasource:
    # 腾讯云 CynosDB 外网（默认）；同 VPC 云服务器可设 DB_HOST=172.21.0.2 DB_PORT=3306
    url: jdbc:mysql://${DB_HOST:bj-cynosdbmysql-grp-7t95af7a.sql.tencentcdb.com}:${DB_PORT:20873}/${DB_NAME:fun_alarm}?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

app:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
